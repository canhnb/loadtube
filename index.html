<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT History + Playlist</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>

<body class="bg-zinc-950 text-white">

<div class="flex h-screen flex-col md:flex-row">

<!-- SIDEBAR -->
<div class="w-full md:w-96 bg-zinc-900 flex flex-col">

<!-- INPUT -->
<div class="p-4">
    <input id="url-input" placeholder="Dán link YouTube..."
        class="w-full p-3 rounded bg-zinc-800">
    <button onclick="playVideo()" class="mt-2 w-full bg-red-600 p-2 rounded">
        ▶ Xem
    </button>
</div>

<!-- HISTORY -->
<div class="flex-1 overflow-y-auto p-4">
    <h2 class="font-bold mb-2">Lịch sử</h2>
    <div id="history-list"></div>
</div>

<!-- PLAYLIST -->
<div class="border-t border-zinc-700 p-4">
    <div class="flex justify-between mb-2">
        <h2 class="font-bold">Playlist</h2>
        <span id="playlist-count">(0)</span>
    </div>

    <div id="playlist-list" class="space-y-2 max-h-40 overflow-y-auto"></div>

    <div class="flex gap-2 mt-2">
        <button onclick="playPlaylist()" class="flex-1 bg-green-600 p-2 rounded">
            ▶ Play
        </button>
        <button onclick="clearPlaylist()" class="flex-1 bg-zinc-700 p-2 rounded">
            Clear
        </button>
    </div>
</div>

</div>

<!-- PLAYER -->
<div class="flex-1 flex items-center justify-center bg-black">
    <div id="player" class="w-full max-w-4xl"></div>
</div>

</div>

<script>
let history = JSON.parse(localStorage.getItem('ytHistory')) || [];
let playlist = JSON.parse(localStorage.getItem('ytPlaylist') || '[]');

let player;
let currentPlaylistIndex = -1;
let isPlayingPlaylist = false;

/* ================= PLAYER ================= */
function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '400',
        width: '100%',
        events: {
            onStateChange: function(event) {
                if (event.data === YT.PlayerState.ENDED && isPlayingPlaylist) {
                    playNextInPlaylist();
                }
            }
        }
    });
}

/* ================= VIDEO ================= */
function extractVideoId(url) {
    const reg = /(?:v=|youtu\.be\/)([^&]+)/;
    const m = url.match(reg);
    return m ? m[1] : null;
}

async function fetchTitle(id){
    try{
        const res = await fetch(`https://noembed.com/embed?url=https://youtube.com/watch?v=${id}`);
        const data = await res.json();
        return data.title || id;
    }catch{
        return id;
    }
}

async function playVideo() {
    if (!player) return alert("Player chưa sẵn sàng");

    const url = document.getElementById('url-input').value;
    const id = extractVideoId(url);
    if (!id) return alert("Link sai");

    const title = await fetchTitle(id);

    player.loadVideoById(id);
    addToHistory({id, title});
}

/* ================= HISTORY ================= */
function addToHistory(video) {
    history = history.filter(v => v.id !== video.id);
    history.unshift(video);
    localStorage.setItem('ytHistory', JSON.stringify(history));
    renderHistory();
}

function renderHistory() {
    const el = document.getElementById('history-list');
    el.innerHTML = '';

    history.forEach((v, i) => {
        const div = document.createElement('div');
        div.className = "p-2 mb-2 bg-zinc-800 flex justify-between cursor-pointer";

        div.innerHTML = `
            <span>${v.title}</span>
            <div>
                <button onclick="addToPlaylist('${v.id}'); event.stopPropagation()">＋</button>
                <button onclick="removeHistory(${i}); event.stopPropagation()">🗑</button>
            </div>
        `;

        div.onclick = () => player.loadVideoById(v.id);

        el.appendChild(div);
    });
}

function removeHistory(i){
    history.splice(i,1);
    localStorage.setItem('ytHistory', JSON.stringify(history));
    renderHistory();
}

/* ================= PLAYLIST ================= */
function savePlaylist() {
    localStorage.setItem('ytPlaylist', JSON.stringify(playlist));
}

function addToPlaylist(id) {
    const item = history.find(h => h.id === id);
    if (!item) return;

    if (!playlist.find(v => v.id === id)) {
        playlist.push(item);
        savePlaylist();
        renderPlaylist();
    }
}

function renderPlaylist() {
    const el = document.getElementById('playlist-list');
    const count = document.getElementById('playlist-count');

    count.textContent = `(${playlist.length})`;
    el.innerHTML = '';

    playlist.forEach((v, i) => {
        const div = document.createElement('div');
        div.className = "p-2 bg-zinc-800 flex justify-between";

        div.innerHTML = `
            <span>${v.title}</span>
            <button onclick="removeFromPlaylist(${i})">✕</button>
        `;

        el.appendChild(div);
    });
}

function removeFromPlaylist(i){
    playlist.splice(i,1);
    savePlaylist();
    renderPlaylist();
}

function clearPlaylist(){
    playlist = [];
    savePlaylist();
    renderPlaylist();
}

function playPlaylist(){
    if (!player) return alert("Player chưa sẵn sàng");
    if (playlist.length === 0) return alert("Playlist trống");

    isPlayingPlaylist = true;
    currentPlaylistIndex = 0;
    playPlaylistVideo();
}

function playPlaylistVideo(){
    if (currentPlaylistIndex >= playlist.length){
        isPlayingPlaylist = false;
        return;
    }

    player.loadVideoById(playlist[currentPlaylistIndex].id);
}

function playNextInPlaylist(){
    currentPlaylistIndex++;
    playPlaylistVideo();
}

/* ================= INIT ================= */
window.onload = () => {
    renderHistory();
    renderPlaylist();
};
</script>

</body>
</html>
