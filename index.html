<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>YT History • Xem & Lưu Lịch Sử</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { 
            font-family: 'Inter', system_ui, sans-serif; 
            margin: 0;
            padding: 0;
        }
        
        .player-container {
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        .history-item {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .history-item:hover {
            transform: translateY(-2px);
            background-color: #1f2937;
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .flex.h-screen {
                flex-direction: column;
            }
            .w-96 {
                width: 100%;
                max-height: 45vh;
                border-r: 0;
                border-b: 1px solid #27272a;
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="flex h-screen overflow-hidden flex-col md:flex-row">
        <!-- Sidebar - Lịch sử -->
        <div class="w-full md:w-96 bg-zinc-900 border-b md:border-r border-zinc-800 flex flex-col">
            <div class="p-4 md:p-6 border-b border-zinc-800 flex items-center gap-3">
                <div class="w-9 h-9 bg-red-600 rounded-2xl flex items-center justify-center text-xl shadow-inner">📺</div>
                <h1 class="text-2xl font-semibold tracking-tight">YT History</h1>
                <span class="text-xs px-2.5 py-1 bg-zinc-800 text-zinc-400 rounded-full font-medium">beta</span>
            </div>

            <!-- Input link -->
            <div class="p-4 md:px-6 md:pt-6">
                <div class="relative">
                    <input 
                        id="url-input" 
                        type="text" 
                        placeholder="Dán link YouTube vào đây..."
                        class="w-full bg-zinc-800 text-white placeholder-zinc-400 border border-zinc-700 focus:border-red-500 rounded-3xl px-5 py-4 text-sm outline-none transition-all">
                    <button 
                        onclick="playVideo()"
                        class="absolute right-2 top-1/2 -translate-y-1/2 bg-red-600 hover:bg-red-500 transition-colors text-white px-6 py-2.5 rounded-3xl text-sm font-semibold flex items-center gap-2 shadow-lg">
                        <span>Xem ngay</span>
                        <span class="text-lg">▶</span>
                    </button>
                </div>
            </div>

            <!-- Lịch sử -->
            <div class="flex-1 flex flex-col min-h-0">
                <div class="px-4 md:px-6 pt-4 pb-3 flex items-center justify-between">
                    <h2 class="text-lg font-semibold text-zinc-100">Lịch sử xem</h2>
                    <button onclick="clearAllHistory()" 
                            class="text-xs px-4 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-zinc-400 hover:text-red-400 transition-colors">
                        🗑️ Xóa hết
                    </button>
                </div>
                <div id="history-list" class="flex-1 overflow-y-auto px-4 space-y-2 pb-6"></div>
            </div>
        </div>

        <!-- Player Area -->
        <div class="flex-1 flex flex-col">
            <!-- Top bar -->
            <div class="h-14 md:h-16 border-b border-zinc-800 bg-zinc-900 px-4 md:px-8 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="text-red-500 text-3xl">▶</div>
                    <h2 class="text-lg md:text-xl font-semibold">YouTube Player</h2>
                </div>
                <div onclick="copyCurrentLink()" class="flex items-center gap-2 cursor-pointer hover:text-red-400 transition-colors text-sm">
                    🔗 Copy link
                </div>
            </div>

            <!-- Player -->
            <div class="flex-1 flex items-center justify-center p-4 bg-black">
                <div id="player-wrapper" class="player-container w-full max-w-5xl">
                    <!-- Placeholder -->
                    <div id="placeholder" class="h-full flex flex-col items-center justify-center text-center px-6">
                        <div class="text-6xl mb-6 opacity-80">🎬</div>
                        <h3 class="text-2xl font-semibold mb-3">Chào mày!</h3>
                        <p class="text-zinc-400 max-w-md">Dán link YouTube hoặc dùng lịch sử bên trái để xem video</p>
                    </div>
                    <!-- Iframe container -->
                    <div id="iframe-container" class="hidden h-full"></div>
                </div>
            </div>

            <!-- Player Controls (Fullscreen + Đóng) -->
            <div id="player-controls" class="hidden bg-zinc-900 border-t border-zinc-800 px-4 py-4 flex items-center justify-center gap-4">
                <button onclick="toggleFullscreen()" 
                        class="flex-1 md:flex-none bg-zinc-800 hover:bg-zinc-700 transition-colors text-white px-6 py-3.5 rounded-3xl text-sm font-medium flex items-center justify-center gap-2">
                    ⛶ <span>Toàn màn hình</span>
                </button>
                
                <button onclick="clearCurrentVideo()" 
                        class="flex-1 md:flex-none bg-zinc-800 hover:bg-zinc-700 transition-colors text-white px-6 py-3.5 rounded-3xl text-sm font-medium flex items-center justify-center gap-2">
                    ✕ Đóng video
                </button>
            </div>

            <!-- Now Playing -->
            <div id="now-playing" class="hidden h-16 bg-zinc-900 border-t border-zinc-800 px-4 items-center gap-4 text-sm">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    <img id="now-thumbnail" src="" class="w-12 h-9 rounded-lg object-cover flex-shrink-0">
                    <div class="min-w-0 flex-1">
                        <p id="now-title" class="font-medium line-clamp-1"></p>
                        <p id="now-time" class="text-xs text-zinc-400"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('ytHistory')) || [];
        let currentVideoId = null;
        let player = null;
        let progressInterval = null;

        function extractVideoId(url) {
            if (!url) return null;
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube.com\/shorts\/)([^"&?\/\s]{11})/i;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        async function fetchVideoTitle(videoId) {
            try {
                const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`);
                const data = await res.json();
                return data.title || 'Video không có tiêu đề';
            } catch (e) {
                return 'Video YouTube';
            }
        }

        function getTimeAgo(date) {
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            if (diffMins < 1) return 'Vừa xong';
            if (diffMins < 60) return `${diffMins} phút trước`;
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours < 24) return `${diffHours} giờ trước`;
            return date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = '';

            if (history.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-40 text-center opacity-60">
                        <div class="text-4xl mb-4">📜</div>
                        <p class="text-zinc-400">Chưa có video nào được xem</p>
                    </div>`;
                return;
            }

            history.forEach((item, index) => {
                const timeAgo = getTimeAgo(new Date(item.watchedAt));
                const progress = item.progress ? ` • ${Math.floor(item.progress/60)}:${(item.progress % 60).toString().padStart(2, '0')}` : '';

                const element = document.createElement('div');
                element.className = `history-item flex gap-3 p-3 rounded-2xl cursor-pointer group`;
                element.innerHTML = `
                    <img src="https://img.youtube.com/vi/${item.id}/hqdefault.jpg" 
                         class="w-20 h-12 rounded-xl object-cover flex-shrink-0">
                    <div class="flex-1 min-w-0">
                        <p class="line-clamp-2 text-sm font-medium leading-tight">${item.title}</p>
                        <p class="text-xs text-zinc-400 mt-1">${timeAgo}${progress}</p>
                    </div>
                    <button onclick="deleteHistoryItem(${index}); event.stopImmediatePropagation()" 
                            class="opacity-0 group-hover:opacity-100 text-red-400 text-xl px-2">🗑️</button>
                `;
                element.onclick = () => playHistoryVideo(item.id);
                container.appendChild(element);
            });
        }

        function deleteHistoryItem(index) {
            if (confirm('Xóa video này khỏi lịch sử?')) {
                history.splice(index, 1);
                localStorage.setItem('ytHistory', JSON.stringify(history));
                renderHistory();
            }
        }

        function clearAllHistory() {
            if (confirm('Xóa hết lịch sử xem luôn hả?')) {
                history = [];
                localStorage.removeItem('ytHistory');
                renderHistory();
            }
        }

        async function addToHistory(videoId, progress = 0) {
            const existingIndex = history.findIndex(h => h.id === videoId);
            if (existingIndex !== -1) history.splice(existingIndex, 1);

            const title = await fetchVideoTitle(videoId);
            history.unshift({
                id: videoId,
                title: title,
                watchedAt: new Date().toISOString(),
                progress: Math.floor(progress)
            });

            if (history.length > 100) history.pop();
            localStorage.setItem('ytHistory', JSON.stringify(history));
            renderHistory();
        }

        function createPlayer(videoId, startSeconds = 0) {
            if (player) player.destroy();

            const container = document.getElementById('iframe-container');
            container.innerHTML = `<div id="youtube-player"></div>`;
            container.classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('player-controls').classList.remove('hidden');
            document.getElementById('now-playing').classList.remove('hidden');

            player = new YT.Player('youtube-player', {
                videoId: videoId,
                playerVars: {
                    autoplay: 1,
                    rel: 0,
                    modestbranding: 1,
                    playsinline: 1,
                    fs: 1
                },
                events: {
                    'onReady': (event) => {
                        event.target.seekTo(startSeconds);
                        currentVideoId = videoId;

                        const item = history.find(h => h.id === videoId);
                        if (item) {
                            document.getElementById('now-thumbnail').src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
                            document.getElementById('now-title').textContent = item.title;
                        }

                        if (progressInterval) clearInterval(progressInterval);
                        progressInterval = setInterval(() => {
                            if (player && player.getPlayerState() === 1) {
                                addToHistory(videoId, player.getCurrentTime());
                            }
                        }, 5000);
                    }
                }
            });
        }

        // Fullscreen function
        function toggleFullscreen() {
            const wrapper = document.getElementById('player-wrapper');
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen().catch(() => {
                    alert("Không thể vào chế độ toàn màn hình trên thiết bị này.");
                });
            } else {
                document.exitFullscreen();
            }
        }

        async function playVideo() {
            const input = document.getElementById('url-input');
            const url = input.value.trim();
            if (!url) return alert('Mày dán link YouTube vô đi bro 😅');

            const videoId = extractVideoId(url);
            if (!videoId) return alert('Link không hợp lệ!');

            await addToHistory(videoId, 0);
            createPlayer(videoId, 0);
            input.value = '';
        }

        async function playHistoryVideo(videoId) {
            const item = history.find(h => h.id === videoId);
            const startTime = item && item.progress ? item.progress : 0;
            await addToHistory(videoId, startTime);
            createPlayer(videoId, startTime);
        }

        function clearCurrentVideo() {
            if (player) player.destroy();
            if (progressInterval) clearInterval(progressInterval);

            document.getElementById('placeholder').classList.remove('hidden');
            document.getElementById('iframe-container').classList.add('hidden');
            document.getElementById('player-controls').classList.add('hidden');
            document.getElementById('now-playing').classList.add('hidden');
            currentVideoId = null;
        }

        function copyCurrentLink() {
            if (!currentVideoId) return alert('Chưa có video đang xem!');
            navigator.clipboard.writeText(`https://youtube.com/watch?v=${currentVideoId}`);
        }

        // Khởi tạo
        window.onload = () => {
            renderHistory();

            const urlInput = document.getElementById('url-input');
            urlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') playVideo();
            });

            console.log('%c✅ YT History - Đã tối ưu mobile + nút Fullscreen!', 'color:#ff0000; font-size:14px; font-weight:bold');
        };
    </script>
</body>
</html>
